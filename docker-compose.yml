services:
  mongo:
    image: mongo:7
    container_name: final-backend-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: final_backend_iii
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: final-backend-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/final_backend_iii
      MONGODB_DB_NAME: final_backend_iii

volumes:
  mongo_data:
